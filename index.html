    toast(existing?'Food updated':'Added to My Foods');
    if(onSaved)onSaved(f);
  }},existing?'Save changes':'Save food');
  const body=h('div',{},
    labeled('Name',nameI),labeled('Brand',brandI),
    labeled('Serving description',servI),labeled('Serving weight (g)',servGI),
    h('label',{class:'lbl'},'Per serving'),
    h('div',{class:'grid2'},labeled('Calories',kI),labeled('Protein (g)',pI)),
    h('div',{class:'grid2 mt8'},labeled('Carbs (g)',cI),labeled('Fat (g)',fI)),
    moreBtn,more,
    h('label',{class:'lbl'},'Additives (E-numbers)'),addSeg,addRow,addList,
    qRow,save);
  body.addEventListener('input',updQ);
  drawAdds();updQ();
  if(existing&&existing.src==='custom'){
    body.append(h('button',{class:'btn danger sm mt8',onclick:async()=>{
      if(!await ask('Delete food','Diary history that used it stays intact.','Delete',true))return;
      existing.hidden=1;await saveFood(existing);
      close();renderTab(S.tab);toast('Food removed');
    }},'Delete from My Foods'));
  }
  const close=sheet(existing?'Edit food':'Custom food',body);
}

/* ---------- food picker (recipes & replace-food) ---------- */
function pickFoodSheet(cb){
  const list=h('div',{class:'listcard mt8'});
  function fill(q){
    list.innerHTML='';
    const ql=(q||'').toLowerCase();
    let items=[...S.foods.values()].filter(f=>!f.hidden&&(!ql||f.name.toLowerCase().includes(ql)||(f.brand||'').toLowerCase().includes(ql)));
    items.sort((a,b)=>(b.lastUsed||0)-(a.lastUsed||0)||(b.used||0)-(a.used||0));

  }

  const mk=h('button',{class:'btn sm mt8',onclick:()=>{close();customFoodSheet(null,null,f=>cb(f));}},'+ New custom food');
  const close=sheet('Pick a food',h('div',{},inp,list,mk));

}

/* ---------- recipes ("My Meals": one-tap multi-food logging) ---------- */
function mealMacros(m){
  let t={...ZERO};
  for(const it of m.items){
    const f=S.foods.get(it.foodId);
    if(!f)continue;
    t=addMac(t,it.unit==='g'&&f.p100?scaleMac(f.p100,it.amt/100):scaleMac(f.per,it.amt));
  }
  return t;
}
function mealRowBtn(m){
  const t=mealMacros(m);
  const mid=h('div',{class:'grow'},
    h('div',{class:'fr-name'},m.name),
    h('div',{class:'fr-sub'},m.items.length+' items · P'+g1(t.p)+' C'+g1(t.c)+' F'+g1(t.f)));
  const th=h('div',{class:'fr-thumb'},'☰');
  const kcalEl=h('div',{class:'fr-kcal num'},h('b',{},kc(t.kcal)),h('span',{},'kcal'));

}
function recipeSheet(existing){
  const m=existing||{id:'m'+uid(),name:'',items:[],ts:Date.now(),used:0,lastUsed:0};
  const items=[...m.items.map(x=>({...x}))];
  const nameI=h('input',{class:'in',value:m.name,placeholder:'e.g. Protein oats'});
  const list=h('div',{class:'listcard mt8'});
  const totalEl=h('p',{class:'small dim num',style:'margin:8px 2px'});
  function redraw(){
    list.innerHTML='';
    items.forEach((it,i)=>{
      const f=S.foods.get(it.foodId);
      const qty=h('input',{class:'in num',style:'width:64px;padding:8px;text-align:center',
        inputmode:'decimal',value:String(it.amt),

  }
  function total(){
    const t=mealMacros({items});
    totalEl.textContent='Total: '+kc(t.kcal)+' kcal · P'+g1(t.p)+' C'+g1(t.c)+' F'+g1(t.f);
  }
  const addB=h('button',{class:'btn sm mt8',onclick:()=>pickFoodSheet(f=>{
    items.push({foodId:f.id,amt:1,unit:'serv'});redraw();
  })},'+ Add food');
  const save=h('button',{class:'btn primary mt12',onclick:async()=>{
    const name=nameI.value.trim();
    if(!name){toast('Name your meal');return;}
    if(!items.length){toast('Add some foods first');return;}
    m.name=name;m.items=items.filter(x=>x.amt>0);
    const i=S.meals.findIndex(x=>x.id===m.id);
    if(i>=0)S.meals[i]=m;else S.meals.push(m);
    await dbPut('meals',m);
    close();renderTab(S.tab);toast(existing?'Meal updated':'Meal saved');
  }},existing?'Save changes':'Save meal');
  const body=h('div',{},labeled('Meal name',nameI),list,totalEl,addB,save);
  if(existing){
    body.append(h('button',{class:'btn danger sm mt8',onclick:async()=>{
      if(!await ask('Delete meal','Past diary entries stay intact.','Delete',true))return;
      S.meals=S.meals.filter(x=>x.id!==m.id);
      await dbDel('meals',m.id);
      close();renderTab(S.tab);toast('Meal deleted');
    }},'Delete meal'));
  }
  const close=sheet(existing?'Edit meal':'New meal',body);
  redraw();
}
/* recipe importer: paste ingredient lines → parse quantities → best-effort
   match against the local library → hand off to the meal builder */
function parseIngredient(line){
  line=line.replace(/^[-*•\d]+[.)]\s*/,'').trim();
  if(!line)return null;
  let m=line.match(/^([\d.,]+)\s*(g|grams?|ml|kg)\b\s*(?:of\s+)?(.+)$/i);
  if(m){
    let amt=parseFloat(m[1].replace(',','.'));
    if(/kg/i.test(m[2]))amt*=1000;
    return {amt,unit:'g',name:m[3].trim()};
  }
  m=line.match(/^(\d+\/\d+|[\d.,]+)\s*(?:x|×)?\s+(.+)$/);
  if(m){
    let amt=m[1].includes('/')
      ?(+m[1].split('/')[0]/+m[1].split('/')[1])
      :parseFloat(m[1].replace(',','.'));
    return {amt:amt||1,unit:'serv',name:m[2].trim()};
  }
  return {amt:1,unit:'serv',name:line};
}
/* ingredient matching, v2.2 — exact stemmed tokens + coverage scoring.
   The old substring scorer let "chicken breast" resolve to "Breaded Chicken
   Fillets" (any partial hit counted). Now: prep words are ignored, tokens
   are singularised, MOST of the query must match (qCov ≥ .55, so "breast"
   can't silently miss), and candidates whose names are mostly unexplained
   extra words rank below plain whole foods. No match → honest "pick one". */
const MATCH_STOP=new Set(['fresh','raw','ripe','large','medium','small','big',
  'chopped','diced','sliced','grated','minced','shredded','crushed','finely',
  'roughly','thinly','peeled','deseeded','trimmed','optional','taste','pinch',
  'handful','extra','little','plain','boneless','skinless','lean','cooked',
  'boiled','baked','grilled','roasted','steamed','dry','frozen','tinned',
  'canned','drained','tin','tins','jar','pack','bag','cup','cups','tbsp','tsp',
  'tablespoon','tablespoons','teaspoon','teaspoons','clove','cloves','stick',
  'sticks','piece','pieces','the','and','with','into','about','some','few']);
const TOK_ALIAS={yoghurt:'yogurt',zucchini:'courgette',eggplant:'aubergine',
  shrimp:'prawn',garbanzo:'chickpea',capsicum:'pepper',scallion:'spring',
  cornflour:'corn',porridge:'oat'};
const stemTok=t=>{
  t=t.replace(/(sses|shes|ches|xes)$/,m=>m.slice(0,-2))
     .replace(/ies$/,'y').replace(/oes$/,'o').replace(/([^su])s$/,'$1');
  return TOK_ALIAS[t]||t;
};
const matchToks=s=>String(s).toLowerCase().split(/[^a-zà-ÿ]+/)
  .filter(t=>t.length>2&&!MATCH_STOP.has(t)).map(stemTok);
function matchFood(name){
  const toks=matchToks(name);
  if(!toks.length)return null;
  const qlen=toks.reduce((a,t)=>a+t.length,0),qset=new Set(toks);
  let best=null,bs=0;
  for(const f of S.foods.values()){
    if(f.hidden)continue;
    const ft=matchToks(f.name+' '+(f.brand||''));
    if(!ft.length)continue;
    const fset=new Set(ft);
    let match=0;
    for(const t of qset)if(fset.has(t))match+=t.length;
    if(!match)continue;
    const qCov=match/qlen;                 // how much of the QUERY is matched
    if(qCov<.55)continue;
    const flen=ft.reduce((a,t)=>a+t.length,0);
    let fmatch=0;
    for(const t of fset)if(qset.has(t))fmatch+=t.length;
    let s=qCov*.7+(fmatch/flen)*.3;        // penalise mostly-unexplained names
    if(f.src==='seed'||f.src==='custom')s+=.03;  // whole/own foods win ties
    s+=Math.min(f.used||0,20)*.002;              // gentle familiarity nudge
    if(s>bs){bs=s;best=f;}
  }
  return best;
}

/* ---------- barcode scanner ----------
   Fast path: native BarcodeDetector (feature-detected). Fallback: ZXing
   via CDN, lazy-loaded only when the scanner first opens. getUserMedia
   needs a secure context (HTTPS or localhost) — over plain LAN http we
   fall back to typing the digits, which still hits the same lookup. */
const SCAN={stream:null,zx:null,det:null,on:false,done:false};
function loadScript(src){
  return new Promise((res,rej)=>{
    const s=h('script',{src,onload:res,onerror:rej});
    document.head.append(s);
  });
}
async function openScanner(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    manualBarcodeSheet('Camera needs HTTPS (or localhost) — type the barcode digits instead:');
    return;
  }
  SCAN.on=true;SCAN.done=false;
  $('#scanov').classList.add('open');
  try{
    SCAN.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
  }catch(e){
    closeScanner();
    manualBarcodeSheet('Camera unavailable ('+e.name+') — type the barcode digits instead:');
    return;
  }
  const vid=$('#scanvid');
  vid.srcObject=SCAN.stream;
  await vid.play().catch(()=>{});
  if(window.BarcodeDetector){
    try{
      const fmts=await BarcodeDetector.getSupportedFormats();
      if(fmts.includes('ean_13')){
        SCAN.det=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128']});
        bdLoop();return;
      }
    }catch(e){}
  }
  try{
    if(!window.ZXingBrowser)await loadScript('https://unpkg.com/@zxing/browser@0.1.5/umd/zxing-browser.min.js');
    const reader=new ZXingBrowser.BrowserMultiFormatReader();
    SCAN.zx=await reader.decodeFromStream(SCAN.stream,vid,res=>{
      if(res&&SCAN.on)handleCode(res.getText());
    });
  }catch(e){
    closeScanner();
    manualBarcodeSheet('Scanner library couldn’t load'+(S.offline?' (offline)':'')+' — type the digits instead:');
  }
}
function bdLoop(){
  if(!SCAN.on||!SCAN.det)return;
  SCAN.det.detect($('#scanvid')).then(codes=>{
    if(!SCAN.on)return;
    if(codes&&codes.length){handleCode(codes[0].rawValue);return;}
    setTimeout(bdLoop,180);
  }).catch(()=>setTimeout(()=>{if(SCAN.on)bdLoop();},350));
}
function closeScanner(){
  SCAN.on=false;
  if(SCAN.zx){try{SCAN.zx.stop();}catch(e){}SCAN.zx=null;}
  SCAN.det=null;
  if(SCAN.stream){for(const t of SCAN.stream.getTracks())t.stop();SCAN.stream=null;}
  const vid=$('#scanvid');
  if(vid)vid.srcObject=null;
  $('#scanov').classList.remove('open');
}
function handleCode(raw){
  if(SCAN.done)return;
  const code=String(raw).replace(/\D/g,'');
  if(code.length<6)return;
  SCAN.done=true;
  haptic();
  closeScanner();
  lookupBarcode(code);
}
function manualBarcodeSheet(msg){
  const inp=h('input',{class:'in num',inputmode:'numeric',placeholder:'e.g. 5000159484695'});
  const go=h('button',{class:'btn primary mt12',onclick:()=>{
    const code=inp.value.replace(/\D/g,'');
    if(code.length<6){toast('That doesn’t look like a barcode');return;}
    close();lookupBarcode(code);
  }},'Look up');
  const close=sheet('Enter barcode',h('div',{},
    h('p',{class:'small dim',style:'margin:0 2px 10px'},msg),inp,go));
}
async function lookupBarcode(code){
  const cached=S.foods.get('off:'+code);
  if(cached&&!cached.hidden){openLogSheet(cached);return;}   // offline-friendly repeat scan
  const wait=sheet('Looking up…',h('div',{style:'padding:26px 0'},h('div',{class:'spin'}),
    h('p',{class:'small dim',style:'text-align:center;margin-top:12px'},'Barcode '+code)));
  let res;
  try{res=await offFetchProduct(code);}catch(e){res={err:true};}
  wait();
  if(res.food){openLogSheet(res.food);return;}
  const why=res.err
    ?'Couldn’t reach Open Food Facts — you may be offline.'
    :'This barcode isn’t on Open Food Facts (or has no nutrition data).';
  const body=h('div',{},
    h('p',{class:'small dim',style:'margin:0 2px 12px'},why),
    h('button',{class:'btn primary',onclick:()=>{close2();customFoodSheet(null,{barcode:code},f=>openLogSheet(f));}},'Create it as a custom food'),
    h('button',{class:'btn mt8',onclick:()=>{close2();openScanner();}},'Scan again'));
  const close2=sheet('Not found',body);
}

/* which foods delivered the most of a nutrient across the selected range */
function topSourcesCard(days){
  const opts=[['p','Protein','g'],['c','Carbs','g'],['f','Fat','g'],['satf','Sat. fat','g'],
    ['fib','Fibre','g'],['sug','Sugar','g'],
    ...MICROS.map(m=>[m[0],m[1],m[2]])];
  let cur='p';
  const card=h('div',{class:'card'},h('h3',{class:'serif'},'Top sources'));
  const sel=h('select',{class:'in',onchange:e=>{cur=e.target.value;fill();}});
  for(const[k,label]of opts)sel.append(h('option',{value:k},label));
  const list=h('div',{class:'mt8'});
  card.append(sel,list);
  function fill(){
    list.innerHTML='';
    const sums=new Map();
    let total=0;
    for(const ds of days)for(const en of entriesFor(ds)){
      const v=entryMacros(en)[cur]||0;
      if(v<=0)continue;
      sums.set(en.foodId,(sums.get(en.foodId)||0)+v);
      total+=v;
    }
    const top=[...sums.entries()].sort((a,b)=>b[1]-a[1]).slice(0,5);
    const unit=opts.find(o=>o[0]===cur)[2];
    for(const[fid,v]of top){
      const f=S.foods.get(fid);
      list.append(h('div',{class:'microrow'},
        h('span',{class:'ml',style:'flex:0 0 118px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)'},f?f.name:'?'),
        h('div',{class:'mbar'},h('div',{class:'mfill',style:'width:'+Math.max(Math.round(v/total*100),3)+'%'})),
        h('span',{class:'mv num'},g1(v)+' '+unit)));
    }
    if(!top.length)list.append(h('p',{class:'small dim',style:'margin-top:6px'},'Nothing logged in this range yet.'));
  }
  fill();
  return card;
}

/* ---------------- targets: Mifflin-St Jeor ----------------
   BMR = 10·kg + 6.25·cm − 5·age + (m:+5 / f:−161); TDEE = BMR × activity.
   Suggested macros: protein 2 g/kg, fat 0.9 g/kg, carbs = remaining kcal/4. */
function mifflin(prof){
  const s=prof.sex==='m'?5:-161;
  const bmr=10*prof.kg+6.25*prof.cm-5*prof.age+s;
  return {bmr,tdee:bmr*prof.act};
}
function suggestTargets(prof,goal){
  let kcal=mifflin(prof).tdee;
  if(goal==='cut')kcal*=.85;
  else if(goal==='bulk')kcal*=1.1;
  kcal=Math.round(kcal/10)*10;
  const p=Math.round(prof.kg*2),f=Math.round(prof.kg*.9);
  const c=Math.max(Math.round((kcal-p*4-f*9)/4),0);
  return {kcal,p,c,f};
}

/* CSV food log (spreadsheet-friendly flat export of every entry) */
function downloadCSV(){
  const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const lines=[['date','meal','food','brand','amount','unit',...Object.keys(ZERO)].join(',')];
  const sorted=[...S.entries].sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:a.ts-b.ts);
  for(const en of sorted){
    const f=S.foods.get(en.foodId),m=entryMacros(en);
    lines.push([en.date,q(MEAL_NAME[en.meal]||en.meal),q(f?f.name:'?'),q(f?f.brand||'':''),
      en.amt,en.unit,...Object.keys(ZERO).map(k=>Math.round((m[k]||0)*100)/100)].join(','));
  }
  const blob=new Blob([lines.join('\r\n')],{type:'text/csv'});
  const a=h('a',{href:URL.createObjectURL(blob),download:'macrolog-foodlog-'+todayStr()+'.csv'});
  document.body.append(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},2000);
  toast('Food log downloaded ('+sorted.length+' rows)');
}

  const a=h('a',{href:URL.createObjectURL(blob),download:'macrolog-backup-'+todayStr()+'.json'});
  document.body.append(a);a.click();

const FOOD_DEF={src:'custom',barcode:null,brand:'',per:null,servLabel:'1 serving',
  servG:null,p100:null,thumb:null,ns:null,nova:null,adds:null,ts:0,used:0,lastUsed:0,hidden:0,edited:0};
async function applyImport(data){
  if(!data||data.app!=='macrolog'||!Array.isArray(data.entries))
    throw new Error('Not a MacroLog backup file');
  await Promise.all([dbClear('foods'),dbClear('entries'),dbClear('meals'),dbClear('body')]);
  // additive-schema rule: spread defaults so older backups gain new fields
  for(const f of data.foods||[])await dbPut('foods',derivePer({...FOOD_DEF,...f}));
  for(const e of data.entries||[])await dbPut('entries',e);
  for(const m of data.meals||[])await dbPut('meals',m);
  for(const b of data.body||[])await dbPut('body',b);
  const inc=data.settings||{};
  S.set={...DEF,...inc,t:{...DEF.t,...(inc.t||{})},prof:{...DEF.prof,...(inc.prof||{})}};
  await kvPut('settings',S.set);
  await kvPut('notes',data.notes||{});
  await loadAll();
  applyTheme();
  return {entries:(data.entries||[]).length,foods:(data.foods||[]).length};
}
/* auto-repeating daily foods: rules in settings.autoLog are logged once per
   day, the first time the app runs that day (supplements, staple breakfasts) */
async function applyAutoLog(){
  const today=todayStr();
  if(S.set.autoDate===today||!(S.set.autoLog||[]).length)return;
  // skip rules whose exact entry already exists today — e.g. the user
  // copied yesterday (which contained the auto-logged items) before the
  // day's auto-run fired; mirrors the dedupe in copyDaySheet
  const have=new Map();
  for(const e of entriesFor(today)){
    const k=e.foodId+'|'+e.meal+'|'+e.amt+'|'+e.unit;
    have.set(k,(have.get(k)||0)+1);
  }
  let n=0;
  for(const r of S.set.autoLog){
    if(!S.foods.get(r.foodId))continue;
    const k=r.foodId+'|'+r.meal+'|'+r.amt+'|'+r.unit;
    if((have.get(k)||0)>0){have.set(k,have.get(k)-1);continue;}
    await logEntry({date:today,meal:r.meal,foodId:r.foodId,amt:r.amt,unit:r.unit});
    n++;
  }
  S.set.autoDate=today;
  await saveSet();
  if(n)toast('⟳ Auto-logged '+n+' daily item'+(n===1?'':'s'));
}
function importSheet(){
  const file=h('input',{type:'file',accept:'.json,application/json',style:'display:none',
    onchange:async e=>{
      const f=e.target.files[0];

          (data.foods||[]).length+' foods. Your current data will be overwritten.','Import',true))return;

    h('p',{class:'small dim',style:'margin:0 2px 12px'},
      'Restores a MacroLog JSON backup — replaces everything currently on this device.'),
    h('button',{class:'btn primary',onclick:()=>file.click()},'Choose backup file'),file);
  const close=sheet('Import backup',body);
}

/* ---------------- theme ---------------- */
function applyTheme(){
  const light=S.set.theme==='light';
  document.body.classList.toggle('light',light);
  const[a,a2,la]=ACCENTS[S.set.accent]||ACCENTS.bronze;
  const acc=light?la:a,acc2=light?a:a2;

/* ---------------- load & boot ---------------- */
async function loadAll(){
  const[foods,entries,meals,body,set,notes]=await Promise.all([
    allOf('foods'),allOf('entries'),allOf('meals'),allOf('body'),
    kvGet('settings'),kvGet('notes')]);
  S.foods=new Map(foods.map(f=>[f.id,derivePer({...FOOD_DEF,...f})]));
  S.entries=entries;S.meals=meals;S.body=body;
  S.notes=notes||{};
  const inc=set||{};
  S.set={...DEF,...inc,t:{...DEF.t,...(inc.t||{})},prof:{...DEF.prof,...(inc.prof||{})}};
  applyMeals();
  reindex();
  // seed backfill + refresh: hidden/edited seed records persist as
  // tombstones (presence check can never resurrect a deleted staple), and
  // code OWNS the nutrition of unedited seeds — so model upgrades (e.g. the
  // v2 micronutrient fields) propagate into stored copies on next boot.
  for(const sf of SEED_FOODS){
    const ex=S.foods.get(sf.id);
    if(!ex){
      const c={...sf,ts:Date.now()};
      S.foods.set(c.id,c);
      await dbPut('foods',c);
    }else if(!ex.edited){
      const upd={...ex,name:sf.name,per:sf.per,p100:sf.p100,
        servLabel:sf.servLabel,servG:sf.servG,adds:sf.adds};
      if(JSON.stringify(upd)!==JSON.stringify(ex)){
        S.foods.set(sf.id,upd);
        await dbPut('foods',upd);
      }
    }
  }
}
/* cache hygiene (v2.3): every network search caches its results into the
   foods store for offline reuse — left alone that grows without bound and
   every full-library scan (search, recents, matcher) slows with it. Cached
   records the user never logged, edited, hid or referenced anywhere fade
   out after 60 days; re-searching or re-scanning simply re-caches them.
   Anything referenced by a diary entry, meal or auto-log rule is kept
   forever (entries reference foods by id — history must never break). */
async function pruneFoodCache(){
  const used=new Set();
  for(const e of S.entries)used.add(e.foodId);
  for(const m of S.meals)for(const it of m.items||[])used.add(it.foodId);
  for(const r of S.set.autoLog||[])used.add(r.foodId);
  const cutoff=Date.now()-60*86400000;
  let n=0;
  for(const f of [...S.foods.values()]){
    if(f.src!=='off'&&f.src!=='fdc')continue;
    if(f.hidden||f.edited||f.used||f.lastUsed||used.has(f.id))continue;
    if((f.ts||0)>cutoff)continue;
    S.foods.delete(f.id);
    await dbDel('foods',f.id);
    n++;
  }
  return n;
}
const HAPTIC_SW=(()=>{  // iOS ≥18: clicking a hidden switch-checkbox fires a system haptic
  const el=document.createElement('input');
  el.type='checkbox';el.setAttribute('switch','');el.style.display='none';
  return el;
})();
async function boot(){
  document.body.append(HAPTIC_SW);
  await openDB();
  await loadAll();
  await pruneFoodCache();
  applyTheme();
  buildNav();
  S.date=todayStr();
  await applyAutoLog();
  addEventListener('online',()=>netSet(false));
  addEventListener('offline',()=>netSet(true));
  netSet(!navigator.onLine);
  $('#scan-cancel').addEventListener('click',closeScanner);
  $('#main').addEventListener('scroll',()=>closeOpenRow(),{passive:true});
  // iOS keyboard healing: centre focused inputs inside the internal
  // scroller; snap the window back when focus leaves (keyboard can leave
  // the page panned after dismissal)
  document.addEventListener('focusin',e=>{
    if(e.target.matches&&e.target.matches('input,textarea,select'))
      setTimeout(()=>{try{e.target.scrollIntoView({block:'center',behavior:'smooth'});}catch(err){}},300);
  });
  addEventListener('focusout',()=>setTimeout(()=>{
    const a=document.activeElement;
    if(!a||!(a.matches&&a.matches('input,textarea,select')))window.scrollTo(0,0);
  },60));
  // iOS-standalone shell healer (IronLog field fix, iPhone 17/iOS 26):
  // layout viewport AND visualViewport can both report short by status-bar +
  // home-indicator while the canvas is fullscreen; only screen.* is honest.
  // Grow-only, capped, with explicit home-indicator clearance (body.vfix).
  function fixShell(){
    const standalone=navigator.standalone===true||matchMedia('(display-mode: standalone)').matches;
    let target=window.visualViewport?Math.round(visualViewport.height):0;
    if(standalone){
      const portrait=matchMedia('(orientation: portrait)').matches;
      const sh=portrait?Math.max(screen.width,screen.height):Math.min(screen.width,screen.height);
      if(sh>target)target=sh;
    }
    if(!target)return;
    const cur=Math.round(document.body.getBoundingClientRect().height);
    const grow=target-cur;
    if(grow>2&&grow<=140){
      document.documentElement.style.height=target+'px';
      document.body.style.height=target+'px';
      document.body.classList.add('vfix');
    }
  }
  fixShell();
  if(window.visualViewport)visualViewport.addEventListener('resize',fixShell);
  addEventListener('pageshow',fixShell);
  addEventListener('orientationchange',()=>{
    document.documentElement.style.height='';
    document.body.style.height='';
    document.body.classList.remove('vfix');
    setTimeout(fixShell,350);
  });
  // midnight rollover: Today must flip to the new date without a relaunch
  let lastDay=todayStr();
  setInterval(()=>{
    fixShell();
    if(todayStr()!==lastDay){
      lastDay=todayStr();
      applyAutoLog().then(()=>{if(S.tab==='today'||S.tab==='diary')renderTab(S.tab);}).catch(()=>{});
      if(S.tab==='today')switchTab('today');
    }
  },1000);
  if('serviceWorker' in navigator&&window.isSecureContext)
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  // debug/test handle (same pattern as IronLog's __il)
  window.__ml={S,buildExportData,applyImport,loadAll,renderTab,switchTab,
    dayTotals,entryMacros,offToFood,streaks,reindex,dbPut,dbClear,
    suggestTargets,mifflin,matchFood,addScore,addInfo,dayAdditiveStats,
    daySummarySheet,applyAutoLog,logEntry,
    searchRank,netSearch,fdcSearch,fdcToFood,mealRecents,mealFrequents,
    macroMet,starDay,fxBurst,pruneFoodCache,targetFor};
  if(!S.set.onboard)obStart();
  else switchTab('today');
}
boot().catch(err=>{

    '<div style="padding:90px 24px;text-align:center;color:#ff5c5c;font-size:15px">MacroLog failed to start: '+
    err.message+'<br><br>IndexedDB must be available (serve over http:// or https://).</div>');
});
